<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar Sesion - Votapp</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="assets/styles/global.css">

    <style>
        .btn-principal {
            background-color: var(--terciario);
            color: white;
            border-radius: 1rem;
            padding: 1.1rem;
            font-weight: 700;
            border: none;
            transition: all 0.3s;
        }

        .btn-principal:hover {
            background-color: var(--terciario-contenedor);
            transform: translateY(-2px);
            color: white;
        }

        .marca-contenedor {
            width: 64px;
            height: 64px;
            background-color: var(--primario-contenedor);
            border-radius: 1.5rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 8px 24px rgba(0, 86, 210, 0.15);
        }

        .contenedor-principal {
            background-color: var(--superficie-contenedor);
            border-radius: 2.5rem;
            padding: 2.5rem;
            border: 1px solid var(--contorno-variante);
        }
    </style>
</head>

<body>
    <div class="fondo-decorativo"
        style="top: -10%; left: -10%; width: 40vw; height: 40vw; background: var(--primario-fijo); opacity: 0.5;"></div>
    <div class="fondo-decorativo"
        style="bottom: -10%; right: -10%; width: 35vw; height: 35vw; background: #a3f69c; opacity: 0.3;"></div>

    <main class="container min-vh-100 d-flex flex-column align-items-center justify-content-center">
        <div class="w-100" style="max-width: 420px;">

            <div class="text-center mb-5">
                <div class="marca-contenedor mb-4">
                    <span class="material-symbols-outlined fs-2">how_to_vote</span>
                </div>
                <h1 class="fuente-titular fw-800 display-5 text-primary mb-1" style="letter-spacing: -1.5px;">VOTAPP
                </h1>
                <p class="text-secondary fw-medium">Tu futuro no se adivina, se elige.</p>
            </div>

            <div class="contenedor-principal">
                <form id="formulario" autocomplete="off">
                    <div class="mb-4">
                        <label class="form-label small fw-bold  text-secondary ms-1 mb-2" autocomplete="off">DNI</label>
                        <div class="contenedor-icono-input">
                            <span class="material-symbols-outlined">fingerprint</span>
                            <input type="text" class="form-control entrada-personalizada"
                                placeholder="Ingresa tu documento" id="dni">
                        </div>
                    </div>

                    <div class="mb-5">
                        <label class="form-label small fw-bold text-secondary ms-1 mb-2">CONTRASEÑA</label>
                        <div class="contenedor-icono-input">
                            <span class="material-symbols-outlined">person</span>
                            <input type="password" class="form-control entrada-personalizada"
                                placeholder="Ingresa tu contraseña" id="pass">
                        </div>
                    </div>

                    <button type="submit"
                        class="btn-principal w-100 d-flex align-items-center justify-content-center gap-2">
                        <span>Ingresar</span>
                        <span class="material-symbols-outlined fs-5">arrow_forward</span>
                    </button>
                </form>

                <div class="mt-5 pt-4 border-top text-center">
                    <a class="d-block small fw-bold text-decoration-none text-primary mb-3">¿Olvidaste tus
                        credenciales?</a>
                    <p class="small text-secondary mb-0">
                        ¿Problemas para acceder? <a class="fw-bold text-primary text-decoration-none">Soporte</a>
                    </p>
                </div>
            </div>

            <div class="mt-5 d-flex align-items-center justify-content-center gap-3 opacity-50">
                <div style="height: 1px; width: 32px; background: var(--contorno-variante);"></div>
                <span class="small fw-bold tracking-wider" style="font-size: 10px;">IES Joan
                    Coromines</span>
                <div style="height: 1px; width: 32px; background: var(--contorno-variante);"></div>
            </div>

        </div>
    </main>
</body>
<script>

const form = document.getElementById("formulario");

form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const datos = {
        dni: document.getElementById("dni").value,
        pass: document.getElementById("pass").value
    };

    try {
        
        const response = await fetch('/api/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(datos)
        });

        const resultado = await response.json();

        if (response.ok) {
            localStorage.setItem('token_votapp', resultado.token);
            
            window.location.href = resultado.redirect;
        } else {
            alert("Error: " + resultado.error);
        }

    } catch (error) {
        console.error("Error en la conexión:", error);
    }
});
</script>

</html>
