<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elecciones - Votapp</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet">

    <link href="../assets/styles/global.css" rel="stylesheet">
    <link href="../assets/styles/card.css" rel="stylesheet">
    <link href="../assets/styles/administracion.css" rel="stylesheet">
</head>

<body>
    <app-header></app-header>
    <script src="../assets/js/elecciones.js"></script>
    <main class="container py-5">
        <div class="text-center mb-5">
            <h1 class="fw-bold display-5 mb-2" style="color: var(--primario-contenedor);">
                Elecciones Disponibles
            </h1>
            <p class="text-secondary fw-semibold mb-1" id="subtitulo-rol">
                Cargando elecciones de tu rol...
            </p>
            <p class="text-muted small mb-3">Tu voto es seguro y confidencial</p>

            <div id="profesor-acciones" class="d-none mt-3">
                <button
                    class="btn btn-primary fw-bold px-4 py-2 rounded-3 shadow-sm d-inline-flex align-items-center gap-2"
                    id="btn-nueva-votacion" data-bs-toggle="modal" data-bs-target="#modalVotacionProfesor"
                    style="background-color: var(--primario-contenedor); border: none;">
                    <span class="material-symbols-outlined">add_circle</span>
                    Crear Votación Alumnos
                </button>
            </div>
        </div>

        <div class="row g-4 mt-2" id="elecciones-contenedor">
            <div class="col-12 text-center text-secondary py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
            </div>
        </div>
    </main>

    <!-- modal profes creacion de votaciones -->
    <div class="modal fade" id="modalVotacionProfesor" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold fs-4">Crear Nueva Votación (Exclusiva Alumnos)</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="formulario-votacion-profesor" onsubmit="crearVotacionProfesor(event)">
                        <div class="row g-3 mb-3">
                            <div class="col-md-12">
                                <label class="form-label small fw-bold text-secondary">Título de la Votación</label>
                                <input type="text" class="form-control p-3 rounded-3" id="vot-titulo" required>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label small fw-bold text-secondary">Descripción</label>
                                <textarea class="form-control p-3 rounded-3" id="vot-descripcion" rows="3"></textarea>
                            </div>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-secondary">Fecha y Hora de Inicio</label>
                                <input type="datetime-local" class="form-control p-3 rounded-3" id="vot-inicio"
                                    required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-secondary">Fecha y Hora de Fin</label>
                                <input type="datetime-local" class="form-control p-3 rounded-3" id="vot-fin" required>
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-secondary">Tipo de Selección</label>
                                <select class="form-select p-3 rounded-3" id="vot-tipo">
                                    <option value="unica">Única</option>
                                    <option value="multiple">Múltiple</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-secondary">Max Opciones a Elegir</label>
                                <input type="number" class="form-control p-3 rounded-3" id="vot-max" value="1" min="1">
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6">
                                <div class="form-check form-switch p-0 ps-5">
                                    <input class="form-check-input" type="checkbox" id="vot-anonima"
                                        style="width: 2.5em; height: 1.25em;">
                                    <label class="form-check-label fw-bold text-secondary ms-2 mt-1"
                                        for="vot-anonima">Voto Anónimo</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-check form-switch p-0 ps-5">
                                    <input class="form-check-input" type="checkbox" id="vot-tiemporeal" checked
                                        style="width: 2.5em; height: 1.25em;">
                                    <label class="form-check-label fw-bold text-secondary ms-2 mt-1"
                                        for="vot-tiemporeal">Recuento en tiempo real</label>
                                </div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <label class="form-label small fw-bold text-secondary mb-0">Candidatos /
                                    Opciones</label>
                                <button type="button"
                                    class="btn btn-outline-secondary btn-sm rounded-3 py-1 px-3 fw-bold"
                                    onclick="añadirInputOpcionProfesor()">
                                    + Añadir Opción
                                </button>
                            </div>
                            <div class="d-flex flex-column gap-2" id="lista-inputs-opciones-profesor">

                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-3 mt-4">
                            <button type="button" class="btn btn-light px-4 py-3 rounded-3 fw-bold"
                                data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary px-4 py-3 rounded-3 fw-bold"
                                style="background-color: var(--primario-contenedor); border: none;">Crear
                                Votación</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/components/header.js"></script>
    <script src="../assets/components/card_eleccion.js"></script>
</body>

</html>
