<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elecciones - Votapp</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet">

    <link href="../assets/styles/global.css" rel="stylesheet">
    <link href="../assets/styles/card.css" rel="stylesheet">
</head>

<body>
    <app-header></app-header>
    
    <main class="container py-5">
        <div class="text-center mb-5">
            <h1 class="fw-bold display-5 mb-2" style="color: var(--primario-contenedor);">
                Elecciones Disponibles
            </h1>
            <p class="text-secondary fw-semibold mb-1" id="subtitulo-rol">
                Cargando elecciones de tu rol...
            </p>
            <p class="text-muted small">Tu voto es seguro y confidencial</p>
        </div>

        <div class="row g-4 mt-2" id="elecciones-contenedor">
            <div class="col-12 text-center text-secondary py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
            </div>
        </div>
    </main>

    <script src="../assets/components/header.js"></script>
    <script src="../assets/components/card_eleccion.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const parametrosURL = new URLSearchParams(window.location.search);
            const idRol = parametrosURL.get('rolId');
            const nombreRol = parametrosURL.get('rolNombre') || 'Rol Seleccionado';

            const subtitulo = document.getElementById("subtitulo-rol");
            const contenedor = document.getElementById("elecciones-contenedor");

            if (!idRol) {
                subtitulo.textContent = "Error: No se ha seleccionado ningún rol.";
                contenedor.innerHTML = `
                    <div class="col-12 text-center py-5">
                        <p class="text-danger fw-bold fs-5">Falta el identificador de rol en la URL.</p>
                        <a href="home.html" class="btn btn-primary mt-3 px-4 py-2 rounded-3 fw-bold">Volver al Inicio</a>
                    </div>
                `;
                return;
            }

            subtitulo.innerHTML = `Rol Activo: <span class="text-primary fw-bold">${nombreRol}</span>`;

            try {
                const respuesta = await fetch(`/api/elecciones?rolId=${idRol}`);
                const datos = await respuesta.json();

                if (!respuesta.ok) {
                    console.error("Error al obtener elecciones:", datos.error);
                    contenedor.innerHTML = `<div class="col-12 text-center text-danger fw-bold py-5">Error al cargar las elecciones de la base de datos.</div>`;
                    return;
                }

                const elecciones = datos.elecciones || [];

                if (elecciones.length === 0) {
                    contenedor.innerHTML = `
                        <div class="col-12 text-center py-5">
                            <div class="mb-4">
                                <span class="material-symbols-outlined text-secondary opacity-50" style="font-size: 5rem;">
                                    verified_user
                                </span>
                            </div>
                            <h3 class="fw-bold text-secondary">¡Estás al día!</h3>
                            <p class="text-muted mt-2">No hay elecciones activas o ya has participado en todas las votaciones vigentes para este rol.</p>
                            <a href="home.html" class="btn btn-outline-primary mt-4 px-4 py-2 rounded-3 fw-bold">Volver al Selector de Roles</a>
                        </div>
                    `;
                    return;
                }

                contenedor.innerHTML = ""; // Limpiar spinner

                elecciones.forEach(eleccion => {
                    const columna = document.createElement("div");
                    columna.className = "col-12 col-md-6 col-lg-4";
                    
                    columna.innerHTML = `
                        <app-eleccion
                            id-votacion="${eleccion.id_votacion}"
                            titulo="${eleccion.titulo}"
                            descripcion="${eleccion.descripcion || ''}"
                            fecha-inicio="${eleccion.fecha_inicio}"
                            fecha-fin="${eleccion.fecha_fin}"
                            tipo-seleccion="${eleccion.tipo_seleccion}"
                            max-selecciones="${eleccion.max_selecciones}"
                            es-anonima="${eleccion.es_anonima}">
                        </app-eleccion>
                    `;
                    contenedor.appendChild(columna);
                });

            } catch (error) {
                console.error("Error de conexión:", error);
                contenedor.innerHTML = `<div class="col-12 text-center text-danger fw-bold py-5">Error de conexión con el servidor.</div>`;
            }
        });
    </script>
</body>

</html>
