<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet">

    <link href="../assets/styles/global.css" rel="stylesheet">
    <link href="../assets/styles/card.css" rel="stylesheet">
    <title>Dashboard - Votapp</title>
</head>

<body>
    <app-header></app-header>

    <main class="container py-5">

        <h1 class="text-center mb-4 fw-bold" style="color: var(--primario-contenedor); font-size: 60px;">
            Selecciona tu Rol
        </h1>
        <p class="text-center mb-3 text-secondary fw-semibold">Votapp garantiza la transparencia del proceso electoral, por favor identifica tu rol</p>
        <div class="row g-4 mt-4">
            <div class="col-12 col-md-4">
                <app-card icono="backpack" titulo="Alumnos"
                    descripcion="Estudiantes matriculados que participan en elecciones" boton-text="VOTA">
                </app-card>
            </div>

            <div class="col-12 col-md-4">
                <app-card icono="family_restroom" titulo="Padres y Madres"
                    descripcion="Representantes en las familias que participan en elecciones" boton-text="VOTA">
                </app-card>
            </div>

            <div class="col-12 col-md-4">
                <app-card icono="school" titulo="Profesores" descripcion="Equipo docente que participan en elecciones"
                    boton-text="VOTA">
                </app-card>
            </div>
        </div>

        <div class="d-flex align-items-center justify-content-center rounded-5 p-2 mx-auto" 
        style="background-color: var(--primario-fijo); color: var(--primario); font-weight: 500; width: 35%; margin-top: 200px;">
            <span class="material-symbols-outlined">shield_locked</span>
            <span class="ms-2" style="color:var(--texto-variante);">Sistema de votación cifrado de extremo a extremo</span>
        </div>
    </main>
    <script src="../assets/components/header.js"></script>
    <script src="../assets/components/card.js"></script>
</body>

</html>
